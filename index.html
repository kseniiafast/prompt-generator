<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Prompt Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09090f; --surface: #12121e; --surface2: #1c1c2e; --border: #2a2a42;
      --accent: #7c3aed; --accent-h: #6d28d9; --green: #10b981; --red: #ef4444;
      --teal: #0ea5e9; --text: #e2e8f0; --muted: #7b8499;
      --chip-bg: #1e1e32; --chip-on: #4c1d95; --chip-brd: #3b3b5c;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #1a0533 0%, #0f0f2e 60%, #0a1628 100%);
      border-bottom: 1px solid var(--border);
      padding: 18px 28px; display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    header h1 { font-size: 1.35rem; font-weight: 700; background: linear-gradient(90deg,#a78bfa,#60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    header p { color: var(--muted); font-size: .8rem; margin-top: 2px; }
    .mode-toggle { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 3px; gap: 2px; }
    .mode-toggle button { border: none; background: transparent; color: var(--muted); font-family: inherit; font-size: .8rem; font-weight: 500; padding: 7px 15px; border-radius: 7px; cursor: pointer; transition: all .2s; white-space: nowrap; }
    .mode-toggle button.active { background: var(--accent); color: #fff; }

    /* LAYOUT */
    main { max-width: 1360px; margin: 0 auto; padding: 22px 20px 60px; display: grid; grid-template-columns: 1fr 400px; gap: 20px; }
    @media (max-width: 1020px) { main { grid-template-columns: 1fr; } }

    /* MODEL TABS */
    .model-tabs { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 18px; }
    .model-tab { border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-family: inherit; font-size: .76rem; font-weight: 500; padding: 6px 13px; border-radius: 8px; cursor: pointer; transition: all .2s; }
    .model-tab:hover { border-color: var(--accent); color: var(--text); }
    .model-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .model-tab .badge { font-size: .6rem; background: rgba(255,255,255,.18); padding: 1px 5px; border-radius: 4px; margin-left: 4px; }

    /* FIELD */
    .field-label { display: block; font-size: .72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 7px; }
    .subject-wrap { margin-bottom: 16px; }
    .subject-wrap textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: inherit; font-size: .9rem; padding: 11px 13px; resize: vertical; min-height: 70px; outline: none; transition: border-color .2s; }
    .subject-wrap textarea:focus { border-color: var(--accent); }
    .subject-wrap textarea::placeholder { color: var(--muted); }
    .translate-status { font-size: .7rem; margin-top: 5px; height: 14px; color: transparent; transition: color .2s; }
    .translate-status.translating { color: var(--teal); }
    .translate-status.done { color: var(--green); }
    .translate-status.error { color: var(--red); }

    /* CATEGORIES */
    .categories { display: flex; flex-direction: column; gap: 11px; }
    .cat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; transition: border-color .2s; }
    .cat-card:hover { border-color: #3d3d60; }
    /* video-only: shown only in video mode */
    .cat-card.video-only { display: none; }
    body.mode-video .cat-card.video-only { display: block; }
    /* edit-only: shown only in edit mode */
    .cat-card.edit-only { display: none; }
    body.mode-edit .cat-card.edit-only { display: block; }
    /* hide non-edit cards in edit mode */
    body.mode-edit .cat-card:not(.edit-only) { display: none; }

    .cat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .cat-icon { font-size: .9rem; }
    .cat-title { font-size: .74rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .cat-badge { font-size: .65rem; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 1px 7px; border-radius: 10px; margin-left: auto; }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { border: 1px solid var(--chip-brd); background: var(--chip-bg); color: #a0aec0; font-family: inherit; font-size: .77rem; padding: 5px 11px; border-radius: 20px; cursor: pointer; transition: all .15s; user-select: none; }
    .chip:hover { border-color: var(--accent); color: var(--text); }
    .chip.on { background: var(--chip-on); border-color: #7c3aed; color: #d8b4fe; }

    .extra-textarea { width: 100%; background: var(--chip-bg); border: 1px solid var(--chip-brd); border-radius: 8px; color: var(--text); font-family: inherit; font-size: .8rem; padding: 9px 12px; resize: vertical; min-height: 58px; outline: none; margin-top: 10px; transition: border-color .2s; }
    .extra-textarea:focus { border-color: var(--accent); }
    .extra-textarea::placeholder { color: var(--muted); }

    /* REFERENCES */
    .ref-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 11px; overflow: hidden; }
    body.mode-edit .ref-section { display: none; }
    .ref-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 15px; cursor: pointer; user-select: none; }
    .ref-header-left { display: flex; align-items: center; gap: 8px; }
    .ref-title { font-size: .74rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .ref-arrow { color: var(--muted); font-size: .75rem; transition: transform .2s; }
    .ref-section.open .ref-arrow { transform: rotate(180deg); }
    .ref-body { display: none; padding: 0 14px 14px; }
    .ref-section.open .ref-body { display: block; }
    .ref-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 600px) { .ref-grid { grid-template-columns: 1fr; } }
    .ref-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 11px; }
    .ref-item-title { font-size: .7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .upload-zone { border: 1.5px dashed var(--chip-brd); border-radius: 7px; padding: 10px; text-align: center; cursor: pointer; transition: border-color .2s; margin-bottom: 7px; position: relative; min-height: 52px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
    .upload-zone:hover { border-color: var(--accent); }
    .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-hint { font-size: .7rem; color: var(--muted); pointer-events: none; }
    .ref-thumb { width: 100%; max-height: 70px; object-fit: cover; border-radius: 5px; display: none; pointer-events: none; }
    .ref-thumb.show { display: block; }
    .ref-fname { font-size: .65rem; color: var(--teal); display: none; pointer-events: none; }
    .ref-fname.show { display: block; }
    .ref-desc { width: 100%; background: var(--chip-bg); border: 1px solid var(--chip-brd); border-radius: 6px; color: var(--text); font-family: inherit; font-size: .75rem; padding: 7px 9px; resize: none; min-height: 46px; outline: none; transition: border-color .2s; }
    .ref-desc:focus { border-color: var(--accent); }
    .ref-desc::placeholder { color: var(--muted); }

    /* SIDEBAR */
    .sidebar { display: flex; flex-direction: column; gap: 14px; }
    .prompt-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; position: sticky; top: 20px; }
    .prompt-card-top { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid var(--border); background: var(--surface2); }
    .prompt-card-top span { font-size: .73rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .char-count { font-size: .7rem; color: var(--muted); }
    #prompt-out {
      font-family: 'JetBrains Mono', monospace; font-size: .73rem; line-height: 1.75;
      color: #c4d0e8; padding: 14px 15px; min-height: 280px; max-height: 580px;
      overflow-y: auto; white-space: pre-wrap; word-break: break-word;
    }
    #prompt-out.empty { font-family: 'Inter', sans-serif; font-size: .85rem; color: var(--muted); font-style: italic; display: flex; align-items: center; justify-content: center; min-height: 280px; text-align: center; padding: 30px 20px; }
    .prompt-btns { display: flex; gap: 8px; padding: 11px 14px; border-top: 1px solid var(--border); background: var(--surface2); }
    .btn { flex: 1; border: none; border-radius: 8px; font-family: inherit; font-size: .79rem; font-weight: 600; padding: 9px 12px; cursor: pointer; transition: all .2s; }
    .btn-copy { background: var(--accent); color: #fff; }
    .btn-copy:hover { background: var(--accent-h); }
    .btn-copy.copied { background: var(--green); }
    .btn-reset { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
    .btn-reset:hover { border-color: var(--red); color: var(--red); }

    /* TIPS */
    .tips-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
    .tips-card h3 { font-size: .7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 9px; }
    .tip { font-size: .75rem; color: var(--muted); line-height: 1.65; display: none; }
    .tip.on { display: block; }
    .tip strong { color: #a78bfa; }
    .tip code { background: var(--surface2); padding: 1px 5px; border-radius: 3px; font-size: .7rem; color: #67e8f9; font-family: 'JetBrains Mono', monospace; }

    /* PROMPT SYNTAX COLORS */
    .pl { color: #818cf8; font-weight: 600; }   /* label  */
    .pv { color: #e2e8f0; }                      /* value  */
    .ps { color: #f0abfc; }                      /* subject value */
    .pb { color: #34d399; }                      /* bullet */
    .pp { color: #60a5fa; }                      /* params */
    .pd { color: #94a3b8; }                      /* divider */
    .pe { color: #f87171; }                      /* edit header */

    /* TOAST */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--green); color: #fff; font-size: .82rem; font-weight: 600; padding: 10px 18px; border-radius: 9px; transform: translateY(60px); opacity: 0; transition: all .3s cubic-bezier(.34,1.56,.64,1); pointer-events: none; z-index: 999; }
    .toast.show { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>✦ AI Prompt Generator</h1>
    <p>Nano Bano 2 · GPT Image 2 · Kling · Midjourney · Stable Diffusion · DALL-E 3 · Flux</p>
  </div>
  <div class="mode-toggle">
    <button id="btn-image" class="active" onclick="setMode('image')">🖼 Image</button>
    <button id="btn-video" onclick="setMode('video')">🎬 Video</button>
    <button id="btn-edit"  onclick="setMode('edit')">✏️ Edit Photo</button>
  </div>
</header>

<main>
  <div>
    <div class="model-tabs" id="model-tabs"></div>

    <div class="subject-wrap">
      <label class="field-label" id="subject-label">Subject / Scene Description</label>
      <textarea id="subject" placeholder="Type in any language — auto-translated to English in the prompt..." rows="3" oninput="onSubjectInput()"></textarea>
      <div class="translate-status" id="xlat-status"></div>
    </div>

    <!-- References (hidden in edit mode) -->
    <div class="ref-section" id="ref-section">
      <div class="ref-header" onclick="document.getElementById('ref-section').classList.toggle('open')">
        <div class="ref-header-left">
          <span style="font-size:.9rem">📎</span>
          <span class="ref-title">References &amp; Assets</span>
          <span style="font-size:.7rem;color:var(--muted);margin-left:8px">composition · product · logo · style</span>
        </div>
        <span class="ref-arrow">▼</span>
      </div>
      <div class="ref-body">
        <div class="ref-grid" id="ref-grid"></div>
      </div>
    </div>

    <div class="categories" id="categories"></div>
  </div>

  <div class="sidebar">
    <div class="prompt-card">
      <div class="prompt-card-top">
        <span id="prompt-label">Generated Prompt</span>
        <span class="char-count" id="char-count">0 chars</span>
      </div>
      <div id="prompt-out" class="empty">Select parameters on the left — your prompt will appear here...</div>
      <div class="prompt-btns">
        <button class="btn btn-copy" id="btn-copy" onclick="copyPrompt()">Copy Prompt</button>
        <button class="btn btn-reset" onclick="resetAll()">Reset All</button>
      </div>
    </div>
    <div class="tips-card">
      <h3>Model Tips</h3>
      <div id="tips-wrap"></div>
    </div>
  </div>
</main>

<div class="toast" id="toast">Copied to clipboard!</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════════════

const MODELS = [
  { id:'universal',   label:'Universal',        badge:null,
    tip:'<strong>Universal</strong> — balanced structured prompt that works across most AI models. Good when unsure which model to use.' },
  { id:'nano-bano',   label:'Nano Bano 2',       badge:'new',
    tip:'<strong>Nano Bano 2</strong> — responds well to structured keyword blocks. Artistic and stylistic descriptors in sequence work best.' },
  { id:'gpt-image',   label:'GPT Image 2',       badge:null,
    tip:'<strong>GPT Image 2</strong> — best with natural language sentences. Describe details narratively. Full sentences outperform tag lists.' },
  { id:'kling',       label:'Kling',             badge:'video',
    tip:'<strong>Kling</strong> — specialized for video. Always specify camera movement and scene dynamics. Use <strong>Video</strong> mode for best results.' },
  { id:'midjourney',  label:'Midjourney',        badge:null,
    tip:'<strong>Midjourney</strong> — uses suffixes <code>--ar</code> <code>--v 6.1</code> <code>--style raw</code>. Comma-separated keywords. No articles needed.' },
  { id:'stable-diff', label:'Stable Diffusion',  badge:null,
    tip:'<strong>Stable Diffusion</strong> — supports weight tags <code>(keyword:1.3)</code>. Put quality markers first. Use img2img for photo editing.' },
  { id:'dalle3',      label:'DALL-E 3',          badge:null,
    tip:'<strong>DALL-E 3</strong> — understands natural language well. Use "a photograph of…" phrasing. Full descriptive sentences work best.' },
  { id:'flux',        label:'Flux',              badge:null,
    tip:'<strong>Flux</strong> — hybrid of tags and natural language. Lighting details and quality descriptors improve output significantly.' },
];

const CATS = [
  // ── Image / Video categories ──────────────────────────────────────────
  { id:'style', icon:'🎨', title:'Style', video:false, edit:false,
    opts:['Photorealism','Anime','Manga','Oil Painting','Watercolor','Digital Art','Cinematic',
      'Concept Art','Pixel Art','3D Render','Illustration','Retro / Vintage','Minimalism',
      'Surrealism','Pop Art','Noir','Hyperrealism','Line Art','Impressionism'] },
  { id:'lighting', icon:'💡', title:'Lighting', video:false, edit:false,
    opts:['Golden Hour','Blue Hour','Natural Daylight','Studio','Cinematic','Neon',
      'Backlit (Contre-jour)','Soft Diffused','Hard & Sharp','Dramatic','Candlelight / Fire',
      'Bokeh Light','Street Lamp','Moonlight','Sun Rays','Side Light','Rim Light'] },
  { id:'lens', icon:'📷', title:'Lens / Camera', video:false, edit:false,
    opts:['24mm Wide','35mm','50mm Standard','85mm Portrait','135mm Telephoto','200mm+',
      'Macro','Fisheye','Tilt-shift','Cinema Lens','DSLR','35mm Film Grain',
      'Medium Format','Vintage Camera','Drone / Aerial'] },
  { id:'mood', icon:'🌀', title:'Mood / Atmosphere', video:false, edit:false,
    opts:['Epic','Mysterious','Romantic','Melancholic','Joyful','Tense','Peaceful',
      'Mystical','Eerie / Horror','Nostalgic','Dreamy','Lonely','Hopeful',
      'Anxious','Adventurous','Meditative','Serene','Intense'] },
  { id:'palette', icon:'🎭', title:'Color Palette', video:false, edit:false,
    opts:['Warm (Orange / Gold)','Cool (Blue / Steel)','Pastel','Monochrome',
      'Vibrant / Saturated','Earth Tones','Neon','Black & White','Duotone',
      'Lavender','Sepia','Tropical','Scandinavian','Deep Space Blues'] },
  { id:'composition', icon:'🖼', title:'Composition', video:false, edit:false,
    opts:['Rule of Thirds','Golden Ratio','Symmetry','Centered','Negative Space',
      'Leading Lines','Frame within Frame','Low Angle (Worm\'s Eye)',
      'High Angle (Bird\'s Eye)','Dutch Angle','Panoramic','Close-up',
      'Medium Shot','Wide Shot','Over-the-shoulder'] },
  { id:'details', icon:'🔬', title:'Details', video:false, edit:false,
    opts:['Ultra-detailed','Hyper-realistic','Sharp Focus on Subject',
      'Bokeh Background','Visible Textures','Fine Brushstrokes','Film Grain',
      'Depth of Field','Lens Flares & Glints','Skin Micro-details',
      'Fabric & Material Detail','Water Droplets'] },
  { id:'environment', icon:'🌍', title:'Environment', video:false, edit:false,
    opts:['Urban / City','Natural Landscape','Studio','Forest','Desert','Mountains',
      'Underwater','Space','Fantasy World','Post-Apocalyptic','Japanese Street',
      'Medieval Castle','Rainy City','Snowy Plains','Tropical Beach',
      'Interior / Indoor','Cafe / Restaurant','Industrial'] },
  { id:'time', icon:'🕐', title:'Time of Day', video:false, edit:false,
    opts:['Dawn','Morning','Noon','Afternoon','Sunset','Twilight / Dusk',
      'Night','Late Night','Midnight','Golden Hour','Blue Hour'] },
  { id:'era', icon:'⏳', title:'Era / Period', video:false, edit:false,
    opts:['Contemporary','1990s','1980s','1970s','1960s','1950s','Victorian',
      'Medieval','Ancient World','Future / Sci-fi','Cyberpunk','Steampunk',
      'Retro-futurism'] },
  { id:'quality', icon:'✨', title:'Quality', video:false, edit:false,
    opts:['8K','4K','RAW','Masterpiece','Highly Detailed','Professional Photography',
      'Award-winning','Photorealistic Render','Ultra HD','Studio Quality',
      'Film Quality','Sharp & Crisp'] },
  // ── Video-only ────────────────────────────────────────────────────────
  { id:'motion', icon:'🎬', title:'Motion / Dynamics', video:true, edit:false, badge:'video',
    opts:['Slow Motion','Time-lapse','Frozen Moment','Smooth Movement',
      'Explosion / Splash','Flying Apart','Gentle Wind Breeze','Smoke & Fog Drift',
      'Water & Waves','Falling','Dancing','Character Walking','Crowd Movement'] },
  { id:'cam-move', icon:'🎥', title:'Camera Movement', video:true, edit:false, badge:'video',
    opts:['Static Camera','Slow Push In (Zoom)','Pull Out (Reveal)',
      'Pan Left to Right','Pan Right to Left','Orbit / Circular',
      'Low Altitude Flight','Aerial Descent','Steadicam / Stabilized',
      'Handheld / Shaky','Dolly Zoom (Vertigo)','FPV Drone'] },
  { id:'pace', icon:'⚡', title:'Pace / Duration', video:true, edit:false, badge:'video',
    opts:['3 seconds','5 seconds','10 seconds','15 seconds',
      'Slow Pace','Medium Pace','Dynamic Pace','Cinematic Rhythm'] },
  // ── Edit-only ─────────────────────────────────────────────────────────
  { id:'edit-type', icon:'✏️', title:'Edit Type', video:false, edit:true, badge:'edit',
    opts:['Season Change','Time of Day Change','Weather Change',
      'Style / Aesthetic Change','Color Grading','Background Replacement',
      'Object Removal','Object Addition','Lighting Adjustment',
      'Environment Change','Texture Change','Age / Era Change',
      'Perspective Change','Mood Change'] },
  { id:'edit-from', icon:'⬅️', title:'From — Current State', video:false, edit:true, badge:'edit',
    opts:['Spring','Summer','Autumn','Winter',
      'Morning','Noon','Evening','Night',
      'Clear Sky','Overcast','Rainy','Snowy','Foggy','Stormy',
      'Realistic / Natural','Vintage / Film','Black & White',
      'Warm Tones','Cool Tones','Dark & Moody','Bright & Airy','Modern','Rustic'] },
  { id:'edit-to', icon:'➡️', title:'To — Desired State', video:false, edit:true, badge:'edit',
    opts:['Spring','Summer','Autumn','Winter',
      'Morning','Noon','Evening','Night',
      'Clear Sky','Overcast','Rainy','Snowy','Foggy','Stormy',
      'Cyberpunk','Neon / Synthwave','Cinematic Film',
      'Oil Painting','Watercolor','Fantasy / Magic','Sci-fi',
      'Dark & Moody','Golden Hour','Dreamy Pastel','Noir','Anime'] },
  { id:'intensity', icon:'🎚️', title:'Transformation Intensity', video:false, edit:true, badge:'edit',
    opts:['Subtle (~20%)','Moderate (~50%)','Dramatic (~80%)','Complete Overhaul (100%)'] },
  { id:'preserve', icon:'🔒', title:'Preserve — Keep Unchanged', video:false, edit:true, badge:'edit',
    opts:['Original Composition','Subject / People','Facial Features',
      'Product Shape & Details','Logo & Text','Proportions',
      'Color Scheme','Lighting Direction','Textures',
      'Background Elements','Camera Angle'] },
];

const REFS = [
  { id:'ref-comp',    label:'📐 Composition Ref',
    ph:'Describe what to borrow from this reference: framing, perspective, layout...' },
  { id:'ref-prod',    label:'📦 Product / Object',
    ph:'Product name + placement — e.g. "BioLite charging station, center foreground, fully lit"' },
  { id:'ref-logo',    label:'🏷️ Logo / Text',
    ph:'Logo name + placement — e.g. "TechBrand logo, bottom-right, white version, 8% width"' },
  { id:'ref-style',   label:'🖌️ Style Reference',
    ph:'What to take from this ref: color grading, mood, texture, lighting...' },
];

// ═══════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════

let currentModel = 'universal';
let currentMode  = 'image';

const sel = {};
CATS.forEach(c => { sel[c.id] = new Set(); });

const refState = {};
REFS.forEach(r => { refState[r.id] = { name: '', desc: '' }; });

let translatedSubject = '';
let xlatTimer = null;
let editAddl = '';

// ═══════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════

function init() {
  renderModelTabs();
  renderRefs();
  renderCategories();
  renderTips();
  rebuild();
}

function renderModelTabs() {
  document.getElementById('model-tabs').innerHTML = MODELS.map(m =>
    `<button class="model-tab${m.id===currentModel?' active':''}" onclick="setModel('${m.id}')">
       ${m.label}${m.badge?`<span class="badge">${m.badge}</span>`:''}
     </button>`
  ).join('');
}

function renderRefs() {
  document.getElementById('ref-grid').innerHTML = REFS.map(r => `

// ═══════════════════════════════════════════════════════════════════════
// EVENT HANDLERS
// ═══════════════════════════════════════════════════════════════════════

function setModel(id) {
  currentModel = id;
  document.querySelectorAll('.model-tab').forEach((b,i) => b.classList.toggle('active', MODELS[i].id===id));
  document.querySelectorAll('.tip').forEach(el => el.classList.toggle('on', el.id===`tip-${id}`));
  rebuild();
}

function setMode(mode) {
  currentMode = mode;
  ['image','video','edit'].forEach(m =>
    document.getElementById(`btn-${m}`).classList.toggle('active', mode===m));
  document.body.className = `mode-${mode}`;

  const lbl = document.getElementById('subject-label');
  const ta  = document.getElementById('subject');
  if (mode === 'edit') {
    lbl.textContent = 'Original Photo Description';
    ta.placeholder  = 'Describe the original photo you want to edit...';
  } else {
    lbl.textContent = 'Subject / Scene Description';
    ta.placeholder  = 'Type in any language — auto-translated to English in the prompt...';
  }
  rebuild();
}

function toggleChip(catId, btn) {
  const v = btn.textContent.trim();
  if (sel[catId].has(v)) { sel[catId].delete(v); btn.classList.remove('on'); }
  else                   { sel[catId].add(v);    btn.classList.add('on'); }
  rebuild();
}

function onRefUpload(id, input) {
  const file = input.files[0];
  if (!file) return;
  refState[id].name = file.name;
  const thumb = document.getElementById(`${id}-thumb`);
  const fname = document.getElementById(`${id}-fname`);
  const hint  = document.getElementById(`${id}-hint`);
  const reader = new FileReader();
  reader.onload = e => {
    thumb.src = e.target.result;
    thumb.classList.add('show');
    fname.textContent = file.name;
    fname.classList.add('show');
    hint.style.display = 'none';
    rebuild();
  };
  reader.readAsDataURL(file);
}

function resetAll() {
  CATS.forEach(c => sel[c.id].clear());
  document.querySelectorAll('.chip.on').forEach(b => b.classList.remove('on'));
  document.getElementById('subject').value = '';
  translatedSubject = '';
  editAddl = '';
  const addlEl = document.getElementById('edit-addl');
  if (addlEl) addlEl.value = '';
  document.getElementById('xlat-status').textContent = '';
  document.getElementById('xlat-status').className = 'translate-status';
  REFS.forEach(r => {
    refState[r.id] = { name:'', desc:'' };
    const thumb = document.getElementById(`${r.id}-thumb`);
    const fname = document.getElementById(`${r.id}-fname`);
    const hint  = document.getElementById(`${r.id}-hint`);
    const desc  = document.getElementById(`${r.id}-desc`);
    if (thumb) { thumb.src=''; thumb.classList.remove('show'); }
    if (fname) { fname.textContent=''; fname.classList.remove('show'); }
    if (hint)  hint.style.display = '';
    if (desc)  desc.value = '';
  });
  rebuild();
}

// ═══════════════════════════════════════════════════════════════════════
// TRANSLATION
// ═══════════════════════════════════════════════════════════════════════

function onSubjectInput() {
  const raw = document.getElementById('subject').value.trim();
  if (!raw || /^[\x00-\x7F\s]*$/.test(raw)) {
    translatedSubject = raw;
    document.getElementById('xlat-status').className = 'translate-status';
    rebuild();
    return;
  }
  clearTimeout(xlatTimer);
  const st = document.getElementById('xlat-status');
  st.textContent = '⟳ Translating...';
  st.className = 'translate-status translating';
  xlatTimer = setTimeout(() => doTranslate(raw), 750);
}

async function doTranslate(text) {
  const st = document.getElementById('xlat-status');
  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(text)}`;
    const res  = await fetch(url);
    const data = await res.json();
    translatedSubject = data[0].map(x => x[0]).join('').trim();
    st.textContent = '✓ Translated to English';
    st.className = 'translate-status done';
  } catch {
    translatedSubject = text;
    st.textContent = '⚠ Translation unavailable — using original text';
    st.className = 'translate-status error';
  }
  rebuild();
}

// ═══════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════

function g(id) { return [...sel[id]]; }

function getSubject() {
  const raw = document.getElementById('subject').value.trim();
  if (!raw) return '';
  if (/^[\x00-\x7F\s]*$/.test(raw)) return raw;
  return translatedSubject || raw;
}

function refsBlock() {
  return REFS.flatMap(r => {
    const d = refState[r.id];
    if (!d.name && !d.desc) return [];
    const lbl = r.label.replace(/^\S+\s/, '');
    let line = `• ${lbl}:`;
    if (d.name) line += ` [${d.name}]`;
    if (d.desc) line += ` ${d.desc}`;
    return [line];
  });
}

function hasContent() {
  return getSubject()
    || CATS.some(c => sel[c.id].size > 0)
    || REFS.some(r => refState[r.id].name || refState[r.id].desc);
}

// ── Build a structured line: "LABEL: val1, val2" ──
// Returns [] if values empty.
function row(label, vals) {
  if (!vals || (Array.isArray(vals) ? !vals.length : !vals)) return [];
  const v = Array.isArray(vals) ? vals.join(', ') : vals;
  return [`${label}: ${v}`];
}

// ═══════════════════════════════════════════════════════════════════════
// PROMPT BUILDERS
// ═══════════════════════════════════════════════════════════════════════

function rebuild() {
  const out = document.getElementById('prompt-out');
  if (!hasContent()) {
    out.innerHTML = currentMode==='edit'
      ? 'Select edit parameters on the left...'
      : 'Select parameters on the left — your prompt will appear here...';
    out.classList.add('empty');
    out._raw = '';
    document.getElementById('char-count').textContent = '0 chars';
    return;
  }

  const d = {
    subject: getSubject(),
    style:   g('style'),    lighting: g('lighting'), lens:    g('lens'),
    mood:    g('mood'),     palette:  g('palette'),  comp:    g('composition'),
    details: g('details'),  env:      g('environment'), time: g('time'),
    era:     g('era'),      quality:  g('quality'),
    motion:  g('motion'),   camMove:  g('cam-move'), pace:    g('pace'),
    eType:   g('edit-type'), eFrom:   g('edit-from'), eTo:    g('edit-to'),
    intensity: g('intensity'), preserve: g('preserve'),
    refs: refsBlock(), addl: editAddl,
  };

  const isVid  = currentMode === 'video';
  const isEdit = currentMode === 'edit';

  let lines;
  if (isEdit) {
    lines = buildEdit(d);
  } else {
    const map = {
      'midjourney':  buildMJ,
      'stable-diff': buildSD,
      'gpt-image':   buildGPT,
      'dalle3':      buildDALLE,
      'kling':       buildKling,
      'flux':        buildFlux,
      'nano-bano':   buildNano,
    };
    lines = (map[currentModel] || buildUniversal)(d, isVid);
  }

  const raw = lines.join('\n');
  out.innerHTML = colorize(lines);
  out.classList.remove('empty');
  out._raw = raw;
  document.getElementById('char-count').textContent = `${raw.length} chars`;
}

// ── Universal ──────────────────────────────────────────────────────────
function buildUniversal(d, vid) {
  const L = [];
  if (d.subject) { L.push('SUBJECT:', d.subject, ''); }
  L.push(...row('STYLE', d.style));
  L.push(...row('LIGHTING', d.lighting));
  L.push(...row('LENS / CAMERA', d.lens));
  L.push(...row('MOOD / ATMOSPHERE', d.mood));
  L.push(...row('COLOR PALETTE', d.palette));
  L.push(...row('COMPOSITION', d.comp));
  L.push(...row('DETAILS', d.details));
  L.push(...row('ENVIRONMENT', d.env));
  L.push(...row('TIME OF DAY', d.time));
  L.push(...row('ERA / PERIOD', d.era));
  if (vid) {
    L.push(...row('MOTION / DYNAMICS', d.motion));
    L.push(...row('CAMERA MOVEMENT', d.camMove));
    L.push(...row('PACE / DURATION', d.pace));
  }
  L.push(...row('QUALITY', d.quality));
  if (d.refs.length) { L.push('', 'REFERENCES:'); d.refs.forEach(r => L.push(r)); }
  return L;
}

// ── Midjourney ─────────────────────────────────────────────────────────
function buildMJ(d, vid) {
  const L = [];
  if (d.subject) { L.push('SUBJECT:', d.subject, ''); }
  L.push(...row('STYLE', d.style));
  L.push(...row('ENVIRONMENT', d.env));
  L.push(...row('TIME OF DAY', d.time));
  L.push(...row('ERA / PERIOD', d.era));
  L.push(...row('LIGHTING', d.lighting));
  L.push(...row('LENS / CAMERA', d.lens));
  L.push(...row('MOOD / ATMOSPHERE', d.mood));
  L.push(...row('COLOR PALETTE', d.palette));
  L.push(...row('COMPOSITION', d.comp));
  L.push(...row('DETAILS', d.details));
  if (vid) { L.push(...row('MOTION', d.motion)); }
  L.push(...row('QUALITY', d.quality));
  if (d.refs.length) { L.push('', 'REFERENCES:'); d.refs.forEach(r => L.push(r)); }
  const p = ['--ar 16:9', '--v 6.1'];
  if (d.style.some(s => /anim|manga/i.test(s))) p.push('--niji 6');
  else p.push('--style raw');
  if (d.quality.some(q => /detail/i.test(q))) p.push('--q 2');
  L.push('', 'PARAMS:', p.join(' '));
  return L;
}

// ── Stable Diffusion ───────────────────────────────────────────────────
function buildSD(d, vid) {
  const L = [];
  if (d.subject) { L.push('SUBJECT:', d.subject, ''); }
  const qTags = d.quality.length ? d.quality.map(q=>`(${q}:1.4)`).join(', ')
    : '(masterpiece:1.4), (best quality:1.3)';
  L.push(`QUALITY TAGS: ${qTags}`);
  if (d.style.length)    L.push(`STYLE: ${d.style.map(s=>`(${s}:1.2)`).join(', ')}`);
  L.push(...row('LIGHTING', d.lighting));
  L.push(...row('LENS / CAMERA', d.lens));
  L.push(...row('MOOD / ATMOSPHERE', d.mood));
  L.push(...row('COLOR PALETTE', d.palette));
  L.push(...row('COMPOSITION', d.comp));
  if (d.details.length) L.push(`DETAILS: ${d.details.map(x=>`(${x}:1.3)`).join(', ')}`);
  L.push(...row('ENVIRONMENT', d.env));
  L.push(...row('TIME OF DAY', d.time));
  L.push(...row('ERA / PERIOD', d.era));
  if (vid) { L.push(...row('MOTION', d.motion)); }
  if (d.refs.length) { L.push('', 'REFERENCES:'); d.refs.forEach(r => L.push(r)); }
  return L;
}

  const L = [];

  L.push(...row('LENS / CAMERA', d.lens.length ? ['Shot with '+d.lens.join(', ')] : []));
  L.push(...row('DETAILS', d.details));

    L.push(...row('CAMERA MOVEMENT', d.camMove));

  L.push(...row('QUALITY', d.quality));
  if (d.refs.length) { L.push('', 'REFERENCES:'); d.refs.forEach(r => L.push(r)); }

  L.push('━━━ PHOTO EDITING PROMPT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━', '');

    'gpt-image':   '━━━ WORKFLOW ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nAttach the original image to the chat and paste this prompt.',
    'dalle3':      '━━━ WORKFLOW ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nUse DALL-E 3 inpainting or the Variations workflow.',
    'kling':       '━━━ WORKFLOW ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nUse Kling Image-to-Video with the original image as reference.',

  };

}

// ═══════════════════════════════════════════════════════════════════════
// COLORIZE OUTPUT
// ═══════════════════════════════════════════════════════════════════════

function colorize(lines) {
  return lines.map(line => {
    if (!line) return '';
    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    // Separator / edit header  ━━━ ... ━━━
    if (/^━+/.test(line))
      return `<span class="pe">${esc(line)}</span>`;

    // Midjourney params line
    if (/^--\w/.test(line.trim()))
      return `<span class="pp">${esc(line)}</span>`;

    // Bullet  •
    if (line.startsWith('• '))
      return `<span class="pb">${esc(line)}</span>`;

    // LABEL: value  — split at first colon
    const m = line.match(/^([A-Z][A-Z0-9 /&_]+:)(.*)/);
    if (m) {
      return `<span class="pl">${esc(m[1])}</span><span class="pv">${esc(m[2])}</span>`;
    }

    // Subject value (line after "SUBJECT:" label — plain, slightly brighter)
    return `<span class="ps">${esc(line)}</span>`;
  }).join('\n');
}

// ═══════════════════════════════════════════════════════════════════════
// COPY
// ═══════════════════════════════════════════════════════════════════════

function copyPrompt() {
  const raw = document.getElementById('prompt-out')._raw || '';
  if (!raw) return;
  navigator.clipboard.writeText(raw).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
    setTimeout(() => { btn.textContent = 'Copy Prompt'; btn.classList.remove('copied'); }, 2000);
  });
}

// ═══════════════════════════════════════════════════════════════════════
init();
</script>
